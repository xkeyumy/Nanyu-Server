async function fetchData() {
  try {
    const res = await fetch(API_ENDPOINT);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('API 返回数据格式错误');
    return data;
  } catch (error) {
    console.warn('无法从 API 加载稿件，使用本地演示数据。', error);
    await new Promise(r => setTimeout(r, 800));
    return MOCK_DATA;
  }
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' })
    + ' ' + d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
}

function getTypeEmoji(type) {
  const map = { '寻物启事':'🔍','表白':'💌','挂人':'⚠️','扩列':'🤝','吐槽':'💬','二手出售':'🛍️','捞人':'🎣' };
  return map[type] || '📄';
}

function renderCards(data) {
  const grid = document.getElementById('cardsGrid');
  if (!data.length) {
    grid.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">暂无符合条件的稿件</div><div class="state-sub">请尝试调整筛选条件</div></div>`;
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = data.slice(start, start + PAGE_SIZE);
  grid.innerHTML = pageData.map((item, i) => `
    <div class="submission-card" style="animation-delay:${i * 60}ms">
      <div class="card-header">
        <span class="card-type-badge type-${item.type}">${getTypeEmoji(item.type)} ${item.type}</span>
        <span class="card-time">${formatDate(item.created_at)}</span>
      </div>
      <div class="card-content">${escapeHtml(item.content)}</div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML=''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 1)
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i - currentPage) === 2)
      html += `<span class="page-btn" style="cursor:default;border:none;color:var(--p5)">…</span>`;
  }
  if (currentPage < pages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  pg.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  renderCards(filteredData);
  renderPagination(filteredData.length);
  window.scrollTo({ top: document.querySelector('.results-section').offsetTop - 80, behavior: 'smooth' });
}

function applyFilter() {
  const start = document.getElementById('dateStart').value;
  const end = document.getElementById('dateEnd').value;
  const type = document.getElementById('typeFilter').value;

  filteredData = allData.filter(item => {
    const d = new Date(item.created_at);
    if (start && d < new Date(start)) return false;
    if (end && d > new Date(end + 'T23:59:59')) return false;
    if (type && item.type !== type) return false;
    return true;
  });

  sortData();
  currentPage = 1;
  document.getElementById('resultsCount').textContent = `共找到 ${filteredData.length} 条稿件`;
  renderCards(filteredData);
  renderPagination(filteredData.length);
}

function resetFilter() {
  document.getElementById('dateStart').value = '';
  document.getElementById('dateEnd').value = '';
  document.getElementById('typeFilter').value = '';
  filteredData = [...allData];
  sortData();
  currentPage = 1;
  document.getElementById('resultsCount').textContent = `共 ${filteredData.length} 条稿件`;
  renderCards(filteredData);
  renderPagination(filteredData.length);
}

function sortData() {
  filteredData.sort((a, b) => {
    const da = new Date(a.created_at), db = new Date(b.created_at);
    return sortOrder === 'desc' ? db - da : da - db;
  });
}

function setSort(order) {
  sortOrder = order;
  document.getElementById('sortNewest').classList.toggle('active', order === 'desc');
  document.getElementById('sortOldest').classList.toggle('active', order === 'asc');
  sortData();
  currentPage = 1;
  renderCards(filteredData);
  renderPagination(filteredData.length);
}

// Init
(async () => {
  try {
    allData = await fetchData();
    filteredData = [...allData];
    sortData();
    document.getElementById('resultsCount').textContent = `共 ${filteredData.length} 条稿件`;
    renderCards(filteredData);
    renderPagination(filteredData.length);
  } catch (e) {
    document.getElementById('cardsGrid').innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">加载失败</div><div class="state-sub">请检查网络连接或稍后重试</div></div>`;
    document.getElementById('resultsCount').textContent = '加载失败';
  }
})();
</script>
